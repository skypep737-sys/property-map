<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salvation Army — Property Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* ── Brand tokens ─────────────────────────────────────────────────────── */
    :root {
      --sa-red:      #EE2A24;
      --sa-red-dim:  rgba(238,42,36,.15);
      --sa-red-glow: rgba(238,42,36,.35);
      --bg:          #060a14;
      --sidebar-bg:  #0b1120;
      --card-hover:  #101828;
      --card-active: #1a0808;
      --border:      #1a2d42;
      --text:        #e2e8f0;
      --muted:       #6b839a;
      --dim:         #3a5266;
    }

    /* ── Reset & layout ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }

    #app { display: flex; height: 100vh; }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */
    #sidebar {
      width: 320px; min-width: 280px;
      background: var(--sidebar-bg);
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      z-index: 1000;
    }

    #sidebar-header {
      padding: 0 0 12px;
      border-bottom: 1px solid var(--border);
    }

    /* Red top bar with logo area */
    .sa-brand {
      background: var(--sa-red);
      padding: 12px 16px 10px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .sa-shield {
      width: 28px; height: 28px; flex-shrink: 0;
      background: white; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: var(--sa-red);
      letter-spacing: -.5px;
    }
    .sa-brand-text h1  { font-size: .95rem; font-weight: 700; color: #fff; letter-spacing: .02em; line-height: 1.1; }
    .sa-brand-text p   { font-size: .65rem; color: rgba(255,255,255,.75); margin-top: 1px; letter-spacing: .06em; text-transform: uppercase; }

    #last-updated { font-size: .7rem; color: var(--muted); padding: 0 16px 6px; }

    #search {
      width: calc(100% - 32px); margin: 0 16px;
      padding: 7px 10px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: .82rem; outline: none;
      transition: border-color .15s;
    }
    #search:focus { border-color: var(--sa-red); }
    #search::placeholder { color: var(--dim); }

    /* filter chips */
    #filters {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .chip {
      padding: 3px 10px; border-radius: 999px; font-size: .72rem;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--muted);
      cursor: pointer; transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }
    .chip.active { border-color: var(--sa-red); background: var(--sa-red-dim); color: #ff8f8c; }
    .chip:hover:not(.active) { border-color: var(--sa-red-glow); }

    /* property list */
    #property-list {
      flex: 1; overflow-y: auto;
      padding: 8px 0;
    }
    #property-list::-webkit-scrollbar { width: 5px; }
    #property-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .prop-card {
      padding: 10px 16px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .1s, border-color .1s;
    }
    .prop-card:hover  { background: var(--card-hover); }
    .prop-card.active { background: var(--card-active); border-left-color: var(--sa-red); }

    .prop-name  { font-size: .85rem; font-weight: 500; }
    .prop-meta  { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .prop-badge {
      display: inline-block; margin-top: 4px;
      padding: 1px 8px; border-radius: 999px;
      font-size: .68rem; font-weight: 600; letter-spacing: .04em;
    }

    #count { padding: 6px 16px; font-size: .72rem; color: var(--dim); border-top: 1px solid var(--border); }

    /* ── Layer panel ──────────────────────────────────────────────────────── */
    #layer-panel {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }
    #layer-panel h2 { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }

    .layer-toggle {
      display: flex; align-items: center; gap: 8px;
      font-size: .8rem; padding: 4px 0; cursor: pointer;
      color: var(--muted);
    }
    .layer-toggle input { accent-color: var(--sa-red); cursor: pointer; }
    .layer-toggle.enabled { color: var(--text); }

    /* ── Map ──────────────────────────────────────────────────────────────── */
    #map { flex: 1; }

    /* ── Popup ────────────────────────────────────────────────────────────── */
    .leaflet-popup-content-wrapper {
      background: var(--sidebar-bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,.6);
    }
    .leaflet-popup-tip { background: var(--sidebar-bg); }
    .popup-title { font-weight: 700; font-size: .9rem; margin-bottom: 6px; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .popup-row   { font-size: .78rem; color: var(--muted); margin-top: 4px; }
    .popup-row span { color: var(--text); }

    /* ── Status bar ───────────────────────────────────────────────────────── */
    #statusbar {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(6,10,20,.88); backdrop-filter: blur(4px);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 10px; font-size: .7rem; color: var(--muted);
      z-index: 500; pointer-events: none;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="sa-brand">
        <div class="sa-shield">S</div>
        <div class="sa-brand-text">
          <h1>Salvation Army</h1>
          <p>Property Map</p>
        </div>
      </div>
      <p id="last-updated">Loading…</p>
      <input id="search" type="text" placeholder="Search name, address, deal type…" />
    </div>

    <div id="filters">
      <div class="chip active" data-type="all">All</div>
      <!-- deal-type chips injected dynamically -->
    </div>

    <div id="property-list"></div>

    <div id="count"></div>

    <!-- Future layers slot in here — uncomment and register in LAYERS below -->
    <div id="layer-panel">
      <h2>Layers</h2>
      <label class="layer-toggle enabled">
        <input type="checkbox" checked data-layer="properties" /> Properties
      </label>
      <!--
      <label class="layer-toggle">
        <input type="checkbox" data-layer="zoning" /> Zoning
      </label>
      <label class="layer-toggle">
        <input type="checkbox" data-layer="demographics" /> Demographics
      </label>
      -->
    </div>
  </div>

  <!-- ── Map ──────────────────────────────────────────────────────────────── -->
  <div id="map"></div>
</div>

<div id="statusbar">Lat — &nbsp; Lng —</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const DATA_URL = "properties.json";

// Deal-type → marker color. Add entries as new types appear in your sheet.
// Any type not listed here gets the default color.
const DEAL_COLORS = {
  default:   "#EE2A24",   // SA red
  // Add deal-type overrides below as needed, e.g.:
  // "Renewal":      "#EE2A24",
  // "Relocation":   "#ff8c00",
  // "New Site":     "#4fde8a",
};

// ── MAP INIT ──────────────────────────────────────────────────────────────────
const map = L.map("map", { zoomControl: true }).setView([37.5, -96], 4);

L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { attribution: '&copy; <a href="https://www.esri.com/">Esri</a>', maxZoom: 19 }
).addTo(map);

// Coordinate display
map.on("mousemove", e => {
  document.getElementById("statusbar").textContent =
    `Lat ${e.latlng.lat.toFixed(5)}   Lng ${e.latlng.lng.toFixed(5)}`;
});

// ── LAYER REGISTRY ────────────────────────────────────────────────────────────
// To add a new layer: add an entry here, add a <label> in #layer-panel above,
// and call registerLayer() after loading your data.
const LAYERS = {};

function registerLayer(name, layerGroup) {
  LAYERS[name] = layerGroup;
  layerGroup.addTo(map);
}

document.getElementById("layer-panel").addEventListener("change", e => {
  const cb = e.target;
  if (!cb.dataset.layer) return;
  const layer = LAYERS[cb.dataset.layer];
  if (!layer) return;
  cb.checked ? layer.addTo(map) : map.removeLayer(layer);
  cb.closest(".layer-toggle").classList.toggle("enabled", cb.checked);
});

// ── MARKER HELPERS ────────────────────────────────────────────────────────────
function colorForType(type) {
  return DEAL_COLORS[type] || DEAL_COLORS.default;
}

function makeIcon(color) {
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="32" viewBox="0 0 24 32">
      <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 20 12 20s12-11 12-20C24 5.4 18.6 0 12 0z"
            fill="${color}" stroke="rgba(0,0,0,.4)" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="5" fill="white" opacity=".9"/>
    </svg>`;
  return L.divIcon({
    html: svg, className: "", iconSize: [24, 32], iconAnchor: [12, 32], popupAnchor: [0, -34],
  });
}

// ── SIDEBAR HELPERS ───────────────────────────────────────────────────────────
let allProperties = [];
let activeType    = "all";
let activeCard    = null;
let markerMap     = {};   // site_id → marker

function badge(type) {
  const color = colorForType(type);
  return `<span class="prop-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${type || "—"}</span>`;
}

function renderList(props) {
  const list = document.getElementById("property-list");
  list.innerHTML = "";
  props.forEach(p => {
    const card = document.createElement("div");
    card.className = "prop-card";
    card.dataset.id = p.site_id;
    card.innerHTML = `
      <div class="prop-name">${p.store_name || "Unnamed"}</div>
      <div class="prop-meta">${p.full_address || ""}</div>
      <div class="prop-meta">Sales Rank: ${p.gross_sales_rank || "—"}</div>
      ${badge(p.deal_type)}`;
    card.addEventListener("click", () => selectProperty(p.site_id));
    list.appendChild(card);
  });
  document.getElementById("count").textContent = `${props.length} propert${props.length === 1 ? "y" : "ies"}`;
}

function selectProperty(id) {
  // Highlight card
  document.querySelectorAll(".prop-card").forEach(c => c.classList.remove("active"));
  const card = document.querySelector(`.prop-card[data-id="${id}"]`);
  if (card) {
    card.classList.add("active");
    card.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }
  // Fly to marker
  const marker = markerMap[id];
  if (marker) {
    map.flyTo(marker.getLatLng(), 14, { duration: 0.8 });
    marker.openPopup();
  }
  activeCard = id;
}

function filteredProperties() {
  const q = document.getElementById("search").value.toLowerCase();
  return allProperties.filter(p => {
    const matchType = activeType === "all" || p.deal_type === activeType;
    const matchQ    = !q || [p.store_name, p.site_id, p.deal_type]
      .some(v => (v || "").toLowerCase().includes(q));
    return matchType && matchQ;
  });
}

function refresh() { renderList(filteredProperties()); }

// ── FILTER CHIPS ──────────────────────────────────────────────────────────────
function buildChips(properties) {
  const types    = [...new Set(properties.map(p => p.deal_type).filter(Boolean))].sort();
  const container = document.getElementById("filters");
  types.forEach(t => {
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.dataset.type = t;
    chip.textContent  = t;
    const color = colorForType(t);
    chip.addEventListener("mouseenter", () => { if (!chip.classList.contains("active")) chip.style.borderColor = color; });
    chip.addEventListener("mouseleave", () => { if (!chip.classList.contains("active")) chip.style.borderColor = ""; });
    container.appendChild(chip);
  });

  container.addEventListener("click", e => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    activeType = chip.dataset.type;
    container.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    refresh();
  });
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", refresh);

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const resp = await fetch(DATA_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const properties = await resp.json();

    allProperties = properties;

    document.getElementById("last-updated").textContent =
      `Updated ${new Date(document.lastModified || Date.now()).toLocaleDateString()}`;

    // Build marker layer
    const markerLayer = L.layerGroup();
    markerMap = {};

    properties.forEach(p => {
      if (!p.lat || !p.lng) return;
      const color  = colorForType(p.deal_type);
      const marker = L.marker([p.lat, p.lng], { icon: makeIcon(color) });

      marker.bindPopup(`
        <div class="popup-title">${p.store_name || "Unnamed"}</div>
        <div class="popup-row">Address &nbsp;<span>${p.full_address || "—"}</span></div>
        <div class="popup-row">Deal Type &nbsp;<span>${p.deal_type || "—"}</span></div>
        <div class="popup-row">Drumline &nbsp;<span>${p.drumline || "—"}</span></div>
        <div class="popup-row">Deal Notes &nbsp;<span>${p.deal_notes || "—"}</span></div>
      `);

      marker.on("click", () => {
        document.querySelectorAll(".prop-card").forEach(c => c.classList.remove("active"));
        const card = document.querySelector(`.prop-card[data-id="${p.site_id}"]`);
        if (card) {
          card.classList.add("active");
          card.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }
      });

      markerLayer.addLayer(marker);
      markerMap[p.site_id] = marker;
    });

    registerLayer("properties", markerLayer);
    buildChips(properties);
    renderList(properties);

    // Fit map to markers if we have any
    const coords = properties.filter(p => p.lat && p.lng).map(p => [p.lat, p.lng]);
    if (coords.length) map.fitBounds(coords, { padding: [40, 40] });

  } catch (err) {
    console.error("Failed to load properties.json:", err);
    document.getElementById("property-list").innerHTML =
      `<div style="padding:16px;color:#f77c6c;font-size:.8rem">
        Failed to load data.<br><small>${err.message}</small>
      </div>`;
  }
}

loadData();
</script>
</body>
</html>
